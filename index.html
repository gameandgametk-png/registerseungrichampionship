<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEUNG RI 2026 - Portal Đơn Vị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; }
        input, select { border: 2px solid #e2e8f0 !important; border-radius: 14px !important; padding: 12px 16px !important; outline: none !important; width: 100%; font-weight: 600; }
        .nav-active { background: #2563eb !important; color: white !important; shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body>

<div class="max-w-7xl mx-auto p-4 md:p-6">
    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full">
            <div class="text-center mb-8">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl rotate-3 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <h2 class="text-2xl font-black text-slate-900 uppercase italic">Club Access</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Đăng nhập hoặc Đăng ký Đơn vị</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="loginClub" placeholder="Tên Đơn vị">
                <input type="password" id="loginCode" placeholder="Mã bảo mật tự chọn">
                <button onclick="handleAccess()" id="accessBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-black transition-all">Truy cập hệ thống</button>
                <p id="loginStatus" class="text-[10px] text-blue-700 italic text-center mt-2"></p>
            </div>
        </div>
    </div>

    <header id="mainHeader" class="hidden flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 bg-white p-6 rounded-[2rem] shadow-sm">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-slate-900 uppercase italic leading-none">SEUNG RI <span class="text-blue-600">LIVE</span></h1>
            <div id="clubTag" class="bg-blue-100 text-blue-600 px-4 py-1.5 rounded-full font-black text-[10px] uppercase">GUEST</div>
        </div>
        <nav class="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner w-full lg:w-auto">
            <button onclick="switchTab('reg')" id="btn-reg" class="tab-btn nav-active flex-1 px-8 py-3 rounded-xl transition-all font-black text-[10px] uppercase">1. Đăng ký & Sửa</button>
            <button onclick="switchTab('view')" id="btn-view" class="tab-btn flex-1 px-8 py-3 rounded-xl transition-all text-slate-400 font-black text-[10px] uppercase">2. Xem kết quả</button>
        </nav>
    </header>

    <div id="section-reg" class="hidden grid lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5 card p-8 border-t-[10px] border-blue-600">
             <h2 id="formTitle" class="text-xl font-black text-slate-800 uppercase mb-6 italic">Đăng ký VĐV</h2>
             <input type="hidden" id="editKey">
             <div class="space-y-4">
                <input type="text" id="vdvName" placeholder="HỌ VÀ TÊN VĐV">
                <select id="mainType" onchange="updateSubTypes()">
                    <option value="Kyorugi">Đối kháng</option>
                    <option value="Poomsae">Quyền</option>
                    <option value="Speed">Tốc độ</option>
                </select>
                <select id="subType"></select>
                <button onclick="saveVdv()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase">Lưu thông tin</button>
             </div>
        </div>
        <div class="lg:col-span-7 card p-8 min-h-screen">
             <h2 class="text-xl font-black text-slate-800 uppercase mb-6 italic">Danh sách của bạn</h2>
             <div id="myAthletes" class="space-y-2"></div>
        </div>
    </div>
</div>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyC00bfXhy9CaF7xVbVqTtcfJqDQfGBechw",
    authDomain: "seungrichampionship-d3985.firebaseapp.com",
    databaseURL: "https://seungrichampionship-d3985-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "seungrichampionship-d3985",
    storageBucket: "seungrichampionship-d3985.firebasestorage.app",
    messagingSenderId: "696543159443",
    appId: "1:696543159443:web:59f4c558600929f4ee1966"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentClub = "";

const CLASSES = {
    Kyorugi: ["Nam Dưới 11: -21kg", "Nam Dưới 11: -24kg", "Nam Dưới 11: -27kg", "Nữ Dưới 11: -21kg", "Nam 12-14: -33kg"],
    Poomsae: ["Cá nhân Nam Dưới 11", "Cá nhân Nữ Dưới 11", "Cá nhân Nam 12-14"],
    Speed: ["Nam Dưới 11", "Nữ Dưới 11"]
};

function handleAccess() {
    const club = document.getElementById('loginClub').value.trim();
    const code = document.getElementById('loginCode').value.trim();
    const btn = document.getElementById('accessBtn');
    const status = document.getElementById('loginStatus');

    if(!club || !code) return alert("Vui lòng nhập đủ Tên đơn vị và Mã bảo mật!");

    btn.disabled = true;
    btn.innerText = "ĐANG KIỂM TRA...";
    status.innerText = "Đang kết nối đến máy chủ...";

    const clubRef = db.ref('club_accounts/' + club);
    
    clubRef.once('value').then(snap => {
        if(snap.exists()) {
            if(snap.val().code === code) {
                enterPortal(club);
            } else {
                alert("Mã bảo mật không đúng!");
                btn.disabled = false; btn.innerText = "Truy cập hệ thống";
            }
        } else {
            if(confirm(`Tạo mới tài khoản cho Đơn vị: ${club}?`)) {
                clubRef.set({ code: code, createdAt: new Date().getTime() })
                .then(() => enterPortal(club))
                .catch(err => alert("Lỗi ghi dữ liệu: " + err.message));
            } else {
                btn.disabled = false; btn.innerText = "Truy cập hệ thống";
            }
        }
    }).catch(err => {
        alert("Lỗi kết nối Firebase: " + err.message);
        btn.disabled = false;
        btn.innerText = "Truy cập hệ thống";
    });
}

function enterPortal(club) {
    currentClub = club;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainHeader').classList.remove('hidden');
    document.getElementById('section-reg').classList.remove('hidden');
    document.getElementById('clubTag').innerText = club;
    updateSubTypes();
    loadMyAthletes();
}

function updateSubTypes() {
    const main = document.getElementById('mainType').value;
    document.getElementById('subType').innerHTML = CLASSES[main].map(c => `<option value="${c}">${c}</option>`).join('');
}

function loadMyAthletes() {
    db.ref('registrations_2026').on('value', snap => {
        const container = document.getElementById('myAthletes');
        container.innerHTML = "";
        const data = snap.val();
        if(!data) return;
        Object.keys(data).forEach(key => {
            const r = data[key];
            if(r.club === currentClub) {
                container.innerHTML += `<div class="p-4 bg-white border mb-2 rounded-xl flex justify-between">
                    <span><b>${r.name}</b><br><small>${r.category} - ${r.subType}</small></span>
                    <button onclick="deleteVdv('${key}')" class="text-red-500 font-bold">XÓA</button>
                </div>`;
            }
        });
    });
}

async function saveVdv() {
    const name = document.getElementById('vdvName').value.trim();
    if(!name) return alert("Nhập tên VĐV");
    await db.ref('registrations_2026').push({
        name, club: currentClub, 
        category: document.getElementById('mainType').value,
        subType: document.getElementById('subType').value,
        isLocked: false
    });
    document.getElementById('vdvName').value = "";
    alert("Đã lưu!");
}

function deleteVdv(key) {
    if(confirm("Xóa VĐV này?")) db.ref('registrations_2026/' + key).remove();
}
</script>
</body>
</html>
