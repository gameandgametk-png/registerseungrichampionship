<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEUNG RI 2026 - Portal Đơn Vị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; }
        input, select, textarea { border: 2px solid #e2e8f0 !important; border-radius: 10px !important; padding: 8px 12px !important; outline: none !important; font-weight: 600; font-size: 13px; }
        .nav-active { background: #2563eb !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        /* Sơ đồ kết quả */
        .bracket-scroll { display: flex; gap: 40px; padding: 20px; align-items: stretch; overflow-x: auto; }
        .round-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 200px; }
        .match-box { position: relative; border-left: 4px solid #cbd5e1; padding-left: 10px; margin: 15px 0; min-height: 80px; display: flex; flex-direction: column; justify-content: center; background: white; border-radius: 0 8px 8px 0; }
        .player-line { height: 38px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; font-size: 0.7rem; }
        .is-winner { background: #fff1f2; color: #dc2626; border-bottom-color: #fecaca; }
        .match-no { position: absolute; left: -35px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 900; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="max-w-[1800px] mx-auto p-4 md:p-6">
        <div id="loginOverlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[100] flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full">
                <h2 class="text-2xl font-black text-slate-900 uppercase mb-6 text-center italic">Club Access</h2>
                <div class="space-y-4">
                    <input type="email" id="loginEmail" placeholder="Email" class="w-full">
                    <input type="password" id="loginPass" placeholder="Mật khẩu" class="w-full">
                    <button onclick="handleAccess()" id="accessBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase">Vào hệ thống</button>
                </div>
            </div>
        </div>

        <header id="mainHeader" class="hidden flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 bg-white p-6 rounded-[2rem] shadow-sm border-b-4 border-blue-600">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-black italic uppercase">SEUNG RI <span class="text-blue-600">LIVE</span></h1>
                <div id="emailTag" class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full font-black text-[10px]">---</div>
                <button onclick="location.reload()" class="text-slate-300 hover:text-red-500 transition">Đăng xuất</button>
            </div>
            <nav class="flex bg-slate-100 p-1.5 rounded-2xl">
                <button onclick="switchTab('reg')" id="btn-reg" class="tab-btn nav-active px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition">1. Đăng ký VĐV</button>
                <button onclick="switchTab('view')" id="btn-view" class="tab-btn px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition text-slate-400 ml-2">2. Xem kết quả</button>
            </nav>
        </header>

        <div id="section-reg" class="hidden space-y-6">
            <div class="card p-6 border-l-[10px] border-blue-600">
                <input type="text" id="vdvClub" placeholder="Tên Đơn vị" class="w-64 mb-4">
                <textarea id="quickPaste" rows="4" class="w-full mb-4" placeholder="Dán danh sách tên..."></textarea>
                <button onclick="processList()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-black text-xs uppercase">Nhập Danh Sách</button>
            </div>
            <div id="step2" class="hidden card p-6 overflow-x-auto">
                <table class="w-full mb-6">
                    <tbody id="tempVdvBody"></tbody>
                </table>
                <button onclick="saveAllTemp()" id="finalSaveBtn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-sm uppercase">Lưu tất cả</button>
            </div>
        </div>

        <div id="section-view" class="hidden space-y-6">
            <div class="card p-6">
                <div class="flex gap-4 items-center mb-6">
                    <select id="resCatSelect" onchange="renderPublicBracket()" class="min-w-[300px]"></select>
                </div>
                <div id="publicBracketContent" class="bracket-scroll bg-slate-50 rounded-3xl min-h-[500px]">
                    </div>
            </div>
        </div>
    </div>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
  authDomain: "seungrichampionship-90984.firebaseapp.com",
  databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seungrichampionship-90984",
  storageBucket: "seungrichampionship-90984.firebasestorage.app",
  messagingSenderId: "1031691130771",
  appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66",
  measurementId: "G-QC40451RRY"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUserEmail = "";
        let tempVdvList = [];
        const CLASSES = {
            Kyorugi: ["Nam Dưới 11: -21kg", "Nam Dưới 11: -24kg", "Nam Dưới 11: -27kg"],
            Poomsae: ["Cá nhân Nam Dưới 11", "Cá nhân Nữ Dưới 11"],
            Speed: ["Nam Dưới 11"]
        };

        function handleAccess() {
            let email = document.getElementById('loginEmail').value.trim().toLowerCase();
            let pass = document.getElementById('loginPass').value.trim();
            if(!email || !pass) return alert("Nhập đủ Email và Mật khẩu!");
            let emailKey = email.replace(/\./g, ',');
            db.ref('seungri_v2026/users/' + emailKey).once('value', snap => {
                if(snap.exists() && snap.val().pass === pass) enterPortal(email);
                else if(!snap.exists()) {
                    if(confirm("Email mới, đăng ký?")) db.ref('seungri_v2026/users/' + emailKey).set({pass, time: Date.now()}).then(() => enterPortal(email));
                } else alert("Sai mật khẩu");
            });
        }

        function enterPortal(email) {
            currentUserEmail = email;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('section-reg').classList.remove('hidden');
            document.getElementById('emailTag').innerText = email;
            db.ref('seungri_v2026/brackets').on('value', snap => {
                const bData = snap.val() || {};
                const sel = document.getElementById('resCatSelect');
                sel.innerHTML = Object.keys(bData).map(k => `<option value="${k}">${k}</option>`).join('');
                window.allBrackets = bData;
                renderPublicBracket();
            });
        }

        function switchTab(tab) {
            document.getElementById('section-reg').classList.toggle('hidden', tab !== 'reg');
            document.getElementById('section-view').classList.toggle('hidden', tab !== 'view');
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition text-slate-400 ml-2");
            document.getElementById('btn-' + tab).className = "tab-btn nav-active px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition";
        }

        function processList() {
            const raw = document.getElementById('quickPaste').value.split('\n').filter(n => n.trim());
            tempVdvList = raw.map(name => ({ name: name.trim().toUpperCase(), category: 'Kyorugi', subType: CLASSES.Kyorugi[0] }));
            renderTempTable();
            document.getElementById('step2').classList.remove('hidden');
        }

        function renderTempTable() {
            document.getElementById('tempVdvBody').innerHTML = tempVdvList.map((v, i) => `
                <tr class="border-b border-slate-100">
                    <td class="p-3 font-black uppercase text-xs">${v.name}</td>
                    <td class="p-3"><select onchange="tempVdvList[${i}].category=this.value;renderTempTable()" class="w-full"><option value="Kyorugi">Đối kháng</option><option value="Poomsae">Quyền</option><option value="Speed">Tốc độ</option></select></td>
                    <td class="p-3 text-center"><button onclick="tempVdvList.splice(${i},1);renderTempTable();" class="text-red-500">✕</button></td>
                </tr>
            `).join('');
        }

        async function saveAllTemp() {
            const club = document.getElementById('vdvClub').value.trim();
            const btn = document.getElementById('finalSaveBtn');
            btn.disabled = true;
            for(let v of tempVdvList) {
                await db.ref('seungri_v2026/registrations').push({...v, club, ownerEmail: currentUserEmail});
            }
            alert("Đã lưu!"); location.reload();
        }

        function renderPublicBracket() {
            const cat = document.getElementById('resCatSelect').value;
            const area = document.getElementById('publicBracketContent');
            if(!cat || !window.allBrackets[cat]) return area.innerHTML = "<p class='p-20 text-center opacity-30'>CHƯA CÓ DỮ LIỆU BỐC THĂM</p>";
            const rounds = window.allBrackets[cat].rounds;
            area.innerHTML = rounds.map(round => `
                <div class="round-column">
                    ${round.map(m => `
                        <div class="match-box">
                            <span class="match-no">(${m.matchNo || ''})</span>
                            <div class="player-line ${m.winner?.name === m.p1.name ? 'is-winner' : ''}">${m.p1.name} <small>${m.p1.club}</small></div>
                            <div class="player-line ${m.winner?.name === m.p2.name ? 'is-winner' : ''}">${m.p2.name} <small>${m.p2.club}</small></div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
