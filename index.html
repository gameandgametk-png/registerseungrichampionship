<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUNG RI 2026 - CỔNG ĐƠN VỊ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .nav-active { background: #2563eb !important; color: white !important; }
        .bracket-scroll { display: flex; gap: 40px; padding: 20px; overflow-x: auto; }
        .round-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 200px; }
        .match-box { border-left: 4px solid #cbd5e1; padding-left: 10px; margin: 15px 0; background: white; border-radius: 0 8px 8px 0; }
        .is-winner { background: #fff1f2; color: #dc2626; border-bottom: 2px solid #fecaca; }
    </style>
</head>
<body>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
            authDomain: "seungrichampionship-90984.firebaseapp.com",
            databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "seungrichampionship-90984",
            storageBucket: "seungrichampionship-90984.firebasestorage.app",
            messagingSenderId: "1031691130771",
            appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const rootRef = "tournament_2026"; // Nhánh duy nhất

        // Hàm lưu VĐV
        async function saveAthletes(list, club, email) {
            for(let v of list) {
                await db.ref(`${rootRef}/registrations`).push({...v, club, ownerEmail: email, isLocked: false});
            }
            db.ref(`${rootRef}/last_club/${email.replace(/\./g,',')}`).set(club);
        }
    </script>
</body>
</html>
