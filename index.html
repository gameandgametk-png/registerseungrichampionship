<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUNG RI 2026 - BỘ NÃO ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0f19; color: #f1f5f9; }
        .admin-card { background: #161d2f; border: 1px solid #232d45; border-radius: 20px; }
        input, select { background: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; border-radius: 10px; padding: 10px; outline: none; }
        .tab-active { background: #2563eb !important; color: white !important; }
        .bracket-scroll { display: flex; gap: 50px; padding: 40px; overflow-x: auto; }
        .round-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 250px; position: relative; }
        .match-box { border-left: 4px solid #3b82f6; padding-left: 12px; margin: 20px 0; background: rgba(255,255,255,0.03); border-radius: 0 10px 10px 0; min-height: 80px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .player-line { height: 40px; border-bottom: 1px solid #1f2937; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 11px; cursor: pointer; }
        .is-winner { background: rgba(220, 38, 38, 0.2); color: #f87171; border-bottom-color: #dc2626; font-weight: 900; }
    </style>
</head>
<body>

<div class="max-w-[1600px] mx-auto p-6">
    <header class="flex justify-between items-center mb-8 p-6 admin-card border-b-4 border-blue-600">
        <h1 class="text-2xl font-black italic">ADMIN <span class="text-blue-500">CENTER</span></h1>
        <nav class="flex bg-slate-900 p-1.5 rounded-2xl">
            <button onclick="switchTab('users')" id="t-users" class="tab-active px-6 py-2 rounded-xl text-[10px] font-black uppercase">Tài khoản</button>
            <button onclick="switchTab('control')" id="t-control" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase ml-2">Điều hành</button>
        </nav>
    </header>

    <div id="s-users" class="space-y-6">
        <div class="admin-card p-6">
            <table class="w-full text-left">
                <thead class="text-[10px] uppercase text-slate-500 border-b border-slate-800">
                    <tr><th class="p-4">Email</th><th class="p-4">Mật khẩu</th><th class="p-4">Đơn vị</th><th class="p-4">Xóa</th></tr>
                </thead>
                <tbody id="userBody"></tbody>
            </table>
        </div>
    </div>

    <div id="s-control" class="hidden space-y-6">
        <div class="admin-card p-6 flex gap-4 items-center">
            <select id="subSelect" onchange="loadBracket()" class="w-64"></select>
            <button onclick="drawNow()" class="bg-red-600 px-6 py-2 rounded-xl font-black text-xs uppercase">Bốc thăm lại</button>
        </div>
        <div id="bracketArea" class="admin-card min-h-[600px] bracket-scroll"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
    authDomain: "seungrichampionship-90984.firebaseapp.com",
    databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "seungrichampionship-90984",
    storageBucket: "seungrichampionship-90984.firebasestorage.app",
    messagingSenderId: "1031691130771",
    appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const root = "tournament_2026";

function switchTab(t) {
    document.getElementById('s-users').classList.toggle('hidden', t!=='users');
    document.getElementById('s-control').classList.toggle('hidden', t!=='control');
    document.getElementById('t-users').classList.toggle('tab-active', t==='users');
    document.getElementById('t-control').classList.toggle('tab-active', t==='control');
}

// Tải tài khoản
db.ref(`${root}/users`).on('value', snap => {
    const body = document.getElementById('userBody'); body.innerHTML = "";
    const data = snap.val() || {};
    Object.keys(data).forEach(k => {
        body.innerHTML += `<tr class="border-b border-slate-800">
            <td class="p-4 text-blue-400">${k.replace(/,/g,'.')}</td>
            <td class="p-4 font-mono">${data[k].pass}</td>
            <td class="p-4" id="club-${k}">...</td>
            <td class="p-4"><button onclick="deleteU('${k}')" class="text-red-500">Xóa</button></td>
        </tr>`;
        db.ref(`${root}/last_club/${k}`).once('value', s => { if(s.exists()) document.getElementById('club-'+k).innerText = s.val(); });
    });
});

// Tải danh sách bốc thăm
db.ref(`${root}/registrations`).on('value', snap => {
    const regs = snap.val() || {};
    const cats = new Set();
    Object.values(regs).forEach(v => cats.add(`${v.category} - ${v.subType}`));
    document.getElementById('subSelect').innerHTML = Array.from(cats).map(c => `<option value="${c}">${c}</option>`).join('');
});

// Bạn hãy thử dán mã này vào file admin.html để đồng bộ nhé!
</script>
</body>
</html>
