<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEUNG RI 2026 - Portal Đơn Vị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; }
        input, select, textarea { border: 2px solid #e2e8f0 !important; border-radius: 10px !important; padding: 8px 12px !important; outline: none !important; font-weight: 600; font-size: 13px; }
        input:focus, select:focus { border-color: #2563eb !important; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .nav-active { background: #2563eb !important; color: white !important; shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .table-input select { width: 100%; min-width: 150px; border: none !important; background: transparent !important; }
        .table-input tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body>

<div class="max-w-7xl mx-auto p-4 md:p-6">
    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center">
            <h2 class="text-2xl font-black text-slate-900 uppercase italic mb-6">Email Login</h2>
            <div class="space-y-4 text-left">
                <input type="email" id="loginEmail" placeholder="Email của bạn" class="w-full">
                <input type="password" id="loginPass" placeholder="Mật khẩu" class="w-full">
                <button onclick="handleAccess()" id="accessBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-black transition-all">Vào hệ thống</button>
            </div>
        </div>
    </div>

    <header id="mainHeader" class="hidden flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 bg-white p-6 rounded-[2rem] shadow-sm border-b-4 border-blue-600">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-slate-900 uppercase italic">SEUNG RI <span class="text-blue-600">LIVE</span></h1>
            <div id="emailTag" class="bg-blue-100 text-blue-600 px-4 py-1.5 rounded-full font-black text-[10px]">---</div>
        </div>
        <nav class="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner">
            <button onclick="switchTab('reg')" id="btn-reg" class="tab-btn nav-active px-8 py-3 rounded-xl transition-all font-black text-[10px] uppercase">1. Nhập VĐV Hàng loạt</button>
            <button onclick="switchTab('view')" id="btn-view" class="tab-btn px-8 py-3 rounded-xl transition-all text-slate-400 font-black text-[10px] uppercase ml-2">2. Danh sách & Kết quả</button>
        </nav>
    </header>

    <div id="section-reg" class="hidden space-y-6">
        <div class="card p-6 border-l-[10px] border-blue-600">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-black uppercase italic text-slate-800">Bước 1: Dán tên danh sách VĐV</h2>
                <input type="text" id="vdvClub" placeholder="Tên Đơn vị (Hiện trên sơ đồ)" class="w-64">
            </div>
            <textarea id="quickPaste" rows="5" class="w-full mb-4" placeholder="Copy danh sách tên từ Excel rồi dán vào đây..."></textarea>
            <button onclick="processList()" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-black text-xs uppercase hover:bg-blue-600 transition-all">Phân tích danh sách</button>
        </div>

        <div id="step2" class="hidden card p-6 overflow-x-auto">
            <h2 class="text-lg font-black uppercase italic text-slate-800 mb-4">Bước 2: Chọn nội dung cho từng người</h2>
            <table class="w-full table-input">
                <thead>
                    <tr class="text-left text-[10px] uppercase text-slate-400 font-black">
                        <th class="p-2">STT</th>
                        <th class="p-2">Họ và Tên</th>
                        <th class="p-2">Nội dung</th>
                        <th class="p-2">Hạng cân / Lứa tuổi</th>
                        <th class="p-2">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="tempVdvBody"></tbody>
            </table>
            <div class="mt-6 flex gap-4">
                <button onclick="saveAllTemp()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-sm uppercase shadow-xl hover:bg-black transition-all">Lưu tất cả VĐV vào hệ thống</button>
                <button onclick="resetTemp()" class="text-slate-400 font-bold text-xs uppercase underline">Xóa làm lại</button>
            </div>
        </div>
    </div>

    <div id="section-view" class="hidden">
        <div class="card p-6 min-h-screen">
            <h2 class="text-xl font-black text-slate-800 uppercase mb-6 italic">VĐV của tôi</h2>
            <div id="myAthletes" class="space-y-3"></div>
        </div>
    </div>
</div>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
  authDomain: "seungrichampionship-90984.firebaseapp.com",
  databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seungrichampionship-90984",
  storageBucket: "seungrichampionship-90984.firebasestorage.app",
  messagingSenderId: "1031691130771",
  appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66",
  measurementId: "G-QC40451RRY"
};

const CLASSES = {
    Kyorugi: ["Nam Dưới 11: -21kg", "Nam Dưới 11: -24kg", "Nam Dưới 11: -27kg", "Nam Dưới 11: -30kg", "Nữ Dưới 11: -21kg", "Nam 12-14: -33kg"],
    Poomsae: ["Cá nhân Nam Dưới 11", "Cá nhân Nữ Dưới 11", "Cá nhân Nam 12-14", "Cá nhân Nữ 12-14"],
    Speed: ["Nam Dưới 11", "Nữ Dưới 11"]
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUserEmail = "";
let tempVdvList = [];

// Đăng nhập
function handleAccess() {
    let email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pass = document.getElementById('loginPass').value.trim();
    if(!email || !pass) return alert("Nhập Email và Pass");
    const emailKey = email.replace(/\./g, ',');
    db.ref('users_v2/' + emailKey).once('value', snap => {
        if(snap.exists() && snap.val().pass === pass) enterPortal(email);
        else if(!snap.exists() && confirm("Đăng ký mới?")) db.ref('users_v2/' + emailKey).set({pass, createdAt: Date.now()}).then(() => enterPortal(email));
        else alert("Sai pass");
    });
}

function enterPortal(email) {
    currentUserEmail = email;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainHeader').classList.remove('hidden');
    document.getElementById('section-reg').classList.remove('hidden');
    document.getElementById('emailTag').innerText = email;
    db.ref('last_club_name/' + email.replace(/\./g, ',')).once('value', s => { if(s.exists()) document.getElementById('vdvClub').value = s.val(); });
    loadMyAthletes();
}

// XỬ LÝ NHẬP HÀNG LOẠT
function processList() {
    const raw = document.getElementById('quickPaste').value.split('\n').filter(n => n.trim());
    if(raw.length === 0) return alert("Dán danh sách tên trước!");
    
    tempVdvList = raw.map(name => ({ name: name.trim().toUpperCase(), category: 'Kyorugi', subType: CLASSES.Kyorugi[0] }));
    renderTempTable();
    document.getElementById('step2').classList.remove('hidden');
}

function renderTempTable() {
    const body = document.getElementById('tempVdvBody');
    body.innerHTML = tempVdvList.map((vdv, index) => `
        <tr class="border-b border-slate-100">
            <td class="p-2 text-slate-400 text-xs font-bold">${index + 1}</td>
            <td class="p-2 font-black text-slate-800">${vdv.name}</td>
            <td class="p-2">
                <select onchange="updateTempCat(${index}, 'category', this.value)">
                    <option value="Kyorugi" ${vdv.category==='Kyorugi'?'selected':''}>Đối kháng</option>
                    <option value="Poomsae" ${vdv.category==='Poomsae'?'selected':''}>Quyền</option>
                    <option value="Speed" ${vdv.category==='Speed'?'selected':''}>Tốc độ</option>
                </select>
            </td>
            <td class="p-2">
                <select id="subSelect-${index}" onchange="updateTempCat(${index}, 'subType', this.value)">
                    ${CLASSES[vdv.category].map(c => `<option value="${c}" ${vdv.subType===c?'selected':''}>${c}</option>`).join('')}
                </select>
            </td>
            <td class="p-2 text-center">
                <button onclick="removeTemp(${index})" class="text-red-400">✕</button>
            </td>
        </tr>
    `).join('');
}

function updateTempCat(index, field, value) {
    tempVdvList[index][field] = value;
    if(field === 'category') {
        tempVdvList[index].subType = CLASSES[value][0];
        renderTempTable(); // Cập nhật lại dropdown hạng cân tương ứng
    }
}

function removeTemp(index) {
    tempVdvList.splice(index, 1);
    renderTempTable();
}

async function saveAllTemp() {
    const club = document.getElementById('vdvClub').value.trim();
    if(!club) return alert("Nhập tên Đơn vị!");
    
    const btn = event.target;
    btn.disabled = true; btn.innerText = "ĐANG LƯU...";

    for(let vdv of tempVdvList) {
        await db.ref('registrations_2026').push({
            ...vdv, club, ownerEmail: currentUserEmail, isLocked: false
        });
    }

    db.ref('last_club_name/' + currentUserEmail.replace(/\./g, ',')).set(club);
    alert(`Đã lưu thành công ${tempVdvList.length} VĐV!`);
    resetTemp();
}

function resetTemp() {
    tempVdvList = [];
    document.getElementById('quickPaste').value = "";
    document.getElementById('step2').classList.add('hidden');
}

function loadMyAthletes() {
    db.ref('registrations_2026').on('value', snap => {
        const container = document.getElementById('myAthletes');
        container.innerHTML = "";
        const data = snap.val();
        if(!data) return;
        Object.keys(data).forEach(key => {
            const r = data[key];
            if(r.ownerEmail === currentUserEmail) {
                container.innerHTML += `
                    <div class="p-4 bg-white border border-slate-100 rounded-2xl flex justify-between shadow-sm">
                        <div>
                            <div class="font-black text-slate-900 uppercase text-sm">${r.name}</div>
                            <div class="text-blue-600 font-bold text-[9px] uppercase">${r.club}</div>
                            <div class="text-slate-400 text-[9px] uppercase mt-1">${r.category} - ${r.subType}</div>
                        </div>
                        <button onclick="deleteVdv('${key}')" class="text-red-500 font-bold text-xs p-2">XÓA</button>
                    </div>`;
            }
        });
    });
}

function deleteVdv(key) { if(confirm("Xóa?")) db.ref('registrations_2026/' + key).remove(); }

function switchTab(tab) {
    document.getElementById('section-reg').classList.toggle('hidden', tab !== 'reg');
    document.getElementById('section-view').classList.toggle('hidden', tab !== 'view');
    document.getElementById('btn-reg').className = `tab-btn flex-1 px-8 py-3 rounded-xl transition-all font-black text-[10px] uppercase ${tab==='reg'?'nav-active':'text-slate-400'}`;
    document.getElementById('btn-view').className = `tab-btn flex-1 px-8 py-3 rounded-xl transition-all font-black text-[10px] uppercase ${tab==='view'?'nav-active':'text-slate-400'}`;
}
</script>
</body>
</html>
